vaadin.launch-browser=true
spring.application.name=vehicle _service_system
server.port=5000
spring.datasource.url=jdbc:postgresql://localhost:5432/autocare_db
#docker local db initiation
#spring.datasource.url=jdbc:postgresql://host.docker.internal:5432/autocare_db
spring.datasource.username=postgres
spring.datasource.password=YOUR_DB_PASSWORD


# Hibernate config
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Corrected Dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.session.jdbc.initialize-schema=always
spring.session.store-type=jdbc
spring.session.jdbc.platform=postgresql